<!--auth.html-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiGri Login</title>

<link rel="icon" type="image/png" href="images/icon.png">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-page">

  <section class="auth-info">
    <div class="logo">LiGri</div>

    <h1>Learn smarter with practice.</h1>

    <p>
      LiGri helps you improve through structured quizzes, progress tracking,
      daily activity stats, and detailed review of your answers.
    </p>
  </section>

  <section class="auth-card">
    <h2 id="authTitle">Login</h2>
    <p id="authSubtitle">Welcome back. Continue your progress.</p>

    <div class="auth-tabs">
      <button id="loginTab" class="tab-btn active">Login</button>
      <button id="registerTab" class="tab-btn">Register</button>
    </div>

    <input type="email" id="email" placeholder="Enter email" autocomplete="email">

    <input
      type="password"
      id="password"
      placeholder="Password"
      autocomplete="current-password"
    >

    <button id="mainBtn" class="main-btn">Login</button>

    <button id="resendBtn" class="resend-btn hidden">
      Resend Verification
    </button>

    <div id="error"></div>
  </section>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
