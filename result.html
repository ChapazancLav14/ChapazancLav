<!--result.html-->
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="icon" type="image/png" href="images/icon.png" />
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/results.css">
  </head>

  <body>
    <!-- 🔙 BACK -->
<button class="back-btn" onclick="goBack()">
  <svg class="back-icon" viewBox="0 0 24 24">
    <path d="M15 18L9 12L15 6"></path>
  </svg>
</button>

    <h1>Արդյունք</h1>

    <div class="result-box">
      <!-- 🎯 PERCENT CIRCLE -->
      <div id="circle" class="circle">
        <span id="percent">0%</span>
      </div>

      <!-- 📊 STATS -->
      <div>
        <p>Ժամանակ: <span id="time"></span></p>
        <p>✅ Ճիշտ: <span id="correct"></span></p>
        <p>❌ Սխալ: <span id="wrong"></span></p>
        <p>🟠 Թերի: <span id="partial"></span></p>
        <p>⏭ Բաց թողնված: <span id="skipped"></span></p>
      </div>
    </div>

    <!-- 🔢 ANSWER GRID -->
    <div id="grid" class="grid"></div>

    <!-- ✅ IMPORTANT: USE MODULE (NO COMPAT SCRIPTS) -->
    <script type="module" src="js/result.js"></script>
  </body>
</html>
