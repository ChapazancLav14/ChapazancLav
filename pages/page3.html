<!--page3.html-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page 1 Options</title>
<link rel="icon" type="image/png" href="../images/icon.png">

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
  text-align: center;
}

/* 🔙 BACK BUTTON */
.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: #0f6d4d;
  color: white;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 28px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  margin-top: 100px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* BUTTON */
.custom-button {
  background-color: #0f6d4d;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 18px;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: 0.2s;
}

.custom-button:hover {
  background-color: #0c5a3f;
}

/* LEFT SIDE */
.left {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* PROGRESS CIRCLE */
.small-circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #e6e6e6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: bold;
  color: #222;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 0 6px white;
}

.small-circle span {
  position: relative;
  z-index: 2;
}

/* ARROW */
.arrow {
  font-size: 22px;
}
</style>
</head>

<body>

<!-- 🔙 BACK -->
<button class="back-btn" onclick="goBack()">←</button>

<h2>Select an option</h2>

<div class="container">

  <!-- OPTION 1 -->
  <button class="custom-button" onclick="openPage(1, 0, 0)">
    <div class="left">
      <div class="small-circle" id="c1"><span>0%</span></div>
      <span>Option 1</span>
    </div>
    <span class="arrow">›</span>
  </button>

  <!-- OPTION 2 -->
  <button class="custom-button" onclick="openPage(2, 0, 0)">
    <div class="left">
      <div class="small-circle" id="c2"><span>0%</span></div>
      <span>Option 2</span>
    </div>
    <span class="arrow">›</span>
  </button>

  <!-- OPTION 3 -->
  <button class="custom-button" onclick="openPage(3, 0, 0)">
    <div class="left">
      <div class="small-circle" id="c3"><span>0%</span></div>
      <span>Option 3</span>
    </div>
    <span class="arrow">›</span>
  </button>

  <!-- OPTION 4 -->
  <button class="custom-button" onclick="openPage(4, 0, 0)">
    <div class="left">
      <div class="small-circle" id="c4"><span>0%</span></div>
      <span>Option 4</span>
    </div>
    <span class="arrow">›</span>
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyANzIW_EqzkHVDzpZaD41LkMHugULjsFFk",
  authDomain: "quiz-app-e973d.firebaseapp.com",
  projectId: "quiz-app-e973d",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔙 BACK
window.goBack = function () {
  window.location.href = "../physics.html";
};

// 🚀 OPEN QUIZ (NEW CLEAN VERSION)
window.openPage = function (option, startId, endId) {
  localStorage.setItem("currentOption", option);

  localStorage.setItem("quizStart", startId);
  localStorage.setItem("quizEnd", endId);

  window.location.href = "../quiz.html";
};

// 🎯 UPDATE CIRCLE
function updateCircle(id, percent) {
  const el = document.getElementById(id);

  el.innerHTML = `<span>${percent}%</span>`;

  el.style.background = `conic-gradient(
    #00e08f ${percent}%,
    #e6e6e6 ${percent}%
  )`;
}

// 🔥 FIREBASE LIVE LISTENER
onAuthStateChanged(auth, (user) => {
  if (!user) return;

  const ref = doc(db, "users", user.uid, "stats", "page3");

  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;

    let data = snap.data();

    updateCircle("c1", data.option1 || 0);
    updateCircle("c2", data.option2 || 0);
    updateCircle("c3", data.option3 || 0);
    updateCircle("c4", data.option4 || 0);
  });
});
</script>

</body>
</html>
